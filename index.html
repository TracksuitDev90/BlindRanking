<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FIRESIDE Blind Rankings</title>
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#141218" />

  <!-- Fonts: Inter for MD3 feel -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Preconnects to image/API CDNs -->
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin>
  <link rel="preconnect" href="https://api.themoviedb.org" crossorigin>
  <link rel="preconnect" href="https://en.wikipedia.org" crossorigin>
  <link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>
  <link rel="preconnect" href="https://commons.wikimedia.org" crossorigin>
  <link rel="preconnect" href="https://api.tvmaze.com" crossorigin>
  <link rel="preconnect" href="https://itunes.apple.com" crossorigin>
  <link rel="preconnect" href="https://pixabay.com" crossorigin>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="container">
      <span class="brand">FIRESIDE</span>
      <span class="brand-sub">Blind Rankings</span>
    </div>
  </header>

  <main class="layout container">
    <!-- Stage (left) -->
    <section class="stage" aria-labelledby="topicTag">
      <div class="stage-top">
        <span id="topicTag" class="chip" aria-live="polite">Topic</span>
        <span id="progress" class="progress-text">1 / 5</span>
      </div>

      <h2 id="itemTitle" class="item-title" aria-live="polite">Loading...</h2>

      <!-- Card -->
      <article id="currentCard" class="card">
        <div id="cardLoading" class="card-loading" hidden aria-hidden="true">
          <div class="spinner" role="status" aria-label="Loading image"></div>
        </div>
        <img id="cardImg" class="card-img" alt="" decoding="async" fetchpriority="high" loading="eager">
      </article>

      <!-- Place buttons -->
      <div id="placeButtons" class="place-buttons" aria-label="Place into rank">
        <button class="btn btn--tonal place" data-rank="1">#1</button>
        <button class="btn btn--tonal place" data-rank="2">#2</button>
        <button class="btn btn--tonal place" data-rank="3">#3</button>
        <button class="btn btn--tonal place" data-rank="4">#4</button>
        <button class="btn btn--tonal place" data-rank="5">#5</button>
      </div>
    </section>

    <!-- Rankings (right) -->
    <section class="ranks" aria-label="Ranking slots">
      <div class="ranks-header">
        <h3 class="ranks-title">Your Rankings</h3>
        <button id="nextTopicBtn" class="btn btn--filled btn--success">New Topic</button>
      </div>

      <ol id="rankList" class="rank-list" role="list" aria-label="Rankings 1 to 5">
        <li class="rank-slot" data-rank="1"><div class="slot-num">#1</div><div class="slot-content empty">--</div></li>
        <li class="rank-slot" data-rank="2"><div class="slot-num">#2</div><div class="slot-content empty">--</div></li>
        <li class="rank-slot" data-rank="3"><div class="slot-num">#3</div><div class="slot-content empty">--</div></li>
        <li class="rank-slot" data-rank="4"><div class="slot-num">#4</div><div class="slot-content empty">--</div></li>
        <li class="rank-slot" data-rank="5"><div class="slot-num">#5</div><div class="slot-content empty">--</div></li>
      </ol>
    </section>
  </main>

  <footer class="app-footer">
    <small>Images via TMDB, Wikipedia, Wikidata, iTunes, TVMaze</small>
  </footer>

  <!-- Confetti overlay -->
  <canvas id="confetti" class="confetti" aria-hidden="true"></canvas>

  <!-- Aria live region (hidden) -->
  <div id="live" class="sr-only" aria-live="polite"></div>

  <!-- Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  </script>

  <!-- Load order: config -> topics -> app -->
  <script defer src="config.js"></script>
  <script defer src="topics.js"></script>
  <script defer src="script.js"></script>
</body>
</html>
